kind = "web"
previewPath = "/"
title = "AgroGuard Limited"
version = "1.0.0"
id = "artifacts/agroguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21266

[services.development]
run = "npm run dev --workspace @workspace/agroguard"

[services.production]
build = [ "npm", "run", "build", "--workspace", "@workspace/agroguard" ]
publicDir = "artifacts/agroguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21266"
BASE_PATH = "/"
