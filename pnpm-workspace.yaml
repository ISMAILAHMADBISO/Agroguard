# ============================================================================
# REPLIT CLOUD ONLY — you do NOT need this file on your own PC.
# ============================================================================
# This project is configured for npm (see package.json "workspaces" + the
# committed package-lock.json). On your own machine just run `npm install`.
#
# Replit's cloud build system, however, requires a pnpm workspace file to set
# up the environment. This file exists solely so the Replit preview/deploy
# keeps working. `link-workspace-packages: true` makes pnpm link the local
# @workspace/* packages from their plain "*" version specs (the same specs npm
# uses), so a single set of package.json files works for both npm and pnpm.
# ============================================================================

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@replit/*'
  - stripe-replit-sync

packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

# Link local @workspace/* packages from "*" specs (npm-compatible).
linkWorkspacePackages: true

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
  esbuild: "0.27.3"
