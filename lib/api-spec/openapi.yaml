openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: AgroGuard Limited - Agricultural IoT Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: farmers
    description: Farmer management
  - name: devices
    description: IoT device management
  - name: readings
    description: Sensor data readings
  - name: alerts
    description: Farm alerts and notifications
  - name: recommendations
    description: AI crop recommendations
  - name: dashboard
    description: Dashboard analytics
  - name: staff
    description: Staff management
  - name: weather
    description: Weather Intelligence
  - name: analytics
    description: Executive Analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── FARMERS ──────────────────────────────────────────────────────────────────
  /farmers:
    get:
      operationId: listFarmers
      tags: [farmers]
      summary: List all farmers (scoped by role for field officers)
      responses:
        "200":
          description: List of farmers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farmer"
    post:
      operationId: createFarmer
      tags: [farmers]
      summary: Create a new farmer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmerInput"
      responses:
        "201":
          description: Farmer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerCreateResult"
        "400":
          description: Invalid input

  /farmers/{id}:
    get:
      operationId: getFarmer
      tags: [farmers]
      summary: Get farmer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farmer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"
        "404":
          description: Farmer not found
    patch:
      operationId: updateFarmer
      tags: [farmers]
      summary: Update farmer details (admin can assign field officer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmerUpdate"
      responses:
        "200":
          description: Farmer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"
        "404":
          description: Farmer not found
    delete:
      operationId: deleteFarmer
      tags: [farmers]
      summary: Delete farmer (any internal staff role)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Farmer deleted
        "404":
          description: Farmer not found

  /farmers/{id}/devices:
    get:
      operationId: getFarmerDevices
      tags: [farmers]
      summary: Get all devices assigned to a farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"

  /farmers/{id}/reset-password:
    post:
      operationId: resetFarmerPassword
      tags: [farmers]
      summary: Reset a farmer's password to a new temporary one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResult"
        "403":
          description: Insufficient permissions
        "404":
          description: Farmer not found

  # ── DEVICES ──────────────────────────────────────────────────────────────────
  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List IoT devices (scoped by role for field officers)
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      operationId: createDevice
      tags: [devices]
      summary: Register a new IoT device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Invalid input

  /devices/{id}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get device by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found
    patch:
      operationId: updateDevice
      tags: [devices]
      summary: Update device info or assign to farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdate"
      responses:
        "200":
          description: Device updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found
    delete:
      operationId: deleteDevice
      tags: [devices]
      summary: Remove device (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Device deleted
        "404":
          description: Device not found

  /devices/{id}/readings:
    get:
      operationId: getDeviceReadings
      tags: [devices]
      summary: Get recent readings for a device (last 50)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"

  # ── SENSOR READINGS ──────────────────────────────────────────────────────────
  /readings:
    get:
      operationId: listReadings
      tags: [readings]
      summary: List recent sensor readings (all devices)
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"
    post:
      operationId: createReading
      tags: [readings]
      summary: Ingest sensor data from IoT device (ESP32)
      description: |
        Called directly by the ESP32 firmware. Accepts the hardware deviceId string.
        Supports the full 7-in-1 soil sensor payload (moisture, temperature, EC, pH, N, P, K)
        as well as simpler sensors that only send moisture + temperature + humidity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorReadingInput"
      responses:
        "201":
          description: Reading ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorReading"
        "400":
          description: Invalid data
        "404":
          description: Device not found

  # ── ALERTS ───────────────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all farm alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a farm alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/resolve:
    patch:
      operationId: resolveAlert
      tags: [alerts]
      summary: Mark alert as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Alert not found

  # ── AI RECOMMENDATIONS ───────────────────────────────────────────────────────
  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List all AI-generated recommendations
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
    post:
      operationId: createRecommendation
      tags: [recommendations]
      summary: Create AI crop/irrigation recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationInput"
      responses:
        "201":
          description: Recommendation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

  /recommendations/{id}/apply:
    patch:
      operationId: applyRecommendation
      tags: [recommendations]
      summary: Mark recommendation as applied
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendation applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          description: Recommendation not found

  # ── STAFF ────────────────────────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member (admin and staff; only admins may create admin/super_admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffCreateResult"

  /staff/{id}:
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Staff updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Staff not found
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Remove staff member (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Staff deleted
        "404":
          description: Staff not found

  /staff/{id}/reset-password:
    post:
      operationId: resetStaffPassword
      tags: [staff]
      summary: Reset a staff member's password to a new temporary one (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResult"
        "403":
          description: Admin access required
        "404":
          description: Staff not found

  # ── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get platform-wide dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/farm-overview:
    get:
      operationId: getFarmOverview
      tags: [dashboard]
      summary: Get per-farm health overview for admin
      responses:
        "200":
          description: Farm health overview list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FarmOverview"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent platform activity feed
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /dashboard/sensor-trends/{deviceId}:
    get:
      operationId: getSensorTrends
      tags: [dashboard]
      summary: Get 24h sensor trend data for charts
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sensor trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorTrendPoint"

  # ── AI ───────────────────────────────────────────────────────────────────────
  /ai/disease-detection:
    post:
      operationId: detectDisease
      tags: [ai]
      summary: Analyse a crop photo and return a disease diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiseaseDetectionInput"
      responses:
        "201":
          description: Diagnosis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseaseReport"

  /ai/disease-reports:
    get:
      operationId: listDiseaseReports
      tags: [ai]
      summary: List crop-disease reports (scoped by role)
      responses:
        "200":
          description: List of disease reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiseaseReport"

  /ai/conversations:
    get:
      operationId: listAiConversations
      tags: [ai]
      summary: List the current user's advisory conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiConversationSummary"

  /ai/conversations/{id}:
    get:
      operationId: getAiConversation
      tags: [ai]
      summary: Get a single advisory conversation with full message history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversation"
        "404":
          description: Conversation not found

  /ai/chat:
    post:
      operationId: sendChatMessage
      tags: [ai]
      summary: Send a message to the AI farming advisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Assistant reply with updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify Paystack transaction and upgrade subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPaymentInput"
      responses:
        "200":
          description: Payment verified and subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerificationResponse"
        "400":
          description: Invalid request or verification failed

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List hardware orders (scoped by role - farmers see their own, admins see all)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/checkout:
    post:
      operationId: checkoutOrder
      tags: [orders]
      summary: Create a new hardware order after Paystack payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Invalid request or verification failed

  /deployments:
    get:
      operationId: listDeployments
      tags: [deployments]
      summary: List deployments (scoped by role - field officers see their own, admins see all)
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
                  
  /deployments/{id}/status:
    post:
      operationId: updateDeploymentStatus
      tags: [deployments]
      summary: Update deployment status (for field officers)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeploymentStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /devices/activate:
    post:
      operationId: activateDevice
      tags: [devices]
      summary: Activate a device hardware (link serial number to order and farmer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateDeviceInput"
      responses:
        "200":
          description: Device activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"



  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory (Admins only)
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/scan:
    post:
      operationId: scanInventory
      tags: [inventory]
      summary: Scan a new serial number into inventory (Admins/Staff)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInventoryInput"
      responses:
        "200":
          description: Inventory added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /maintenance:
    get:
      operationId: listMaintenance
      tags: [maintenance]
      summary: List maintenance tasks
      responses:
        "200":
          description: List of maintenance tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceLog"

  /system-logs:
    get:
      operationId: listSystemLogs
      tags: [system]
      summary: List system logs (Super Admin only)
      responses:
        "200":
          description: List of system logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemLog"

  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Get weather intelligence for a farmer's default farm
      responses:
        "200":
          description: Weather data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherResponse"

  /analytics/executive:
    get:
      operationId: getExecutiveAnalytics
      tags: [analytics]
      summary: Get executive dashboard analytics
      responses:
        "200":
          description: Analytics retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveAnalytics"

  /ai/summary:
    get:
      operationId: getAiSummary
      tags: [recommendations]
      summary: Get a natural language farm condition summary
      responses:
        "200":
          description: Summary generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummaryResponse"

  /knowledge:
    get:
      operationId: listKnowledge
      tags: [knowledge]
      summary: List all knowledge articles
      responses:
        "200":
          description: A list of knowledge articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeArticle"
    post:
      operationId: createKnowledge
      tags: [knowledge]
      summary: Create a new knowledge article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeArticleInput"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeArticle"

  /knowledge/{id}:
    delete:
      operationId: deleteKnowledge
      tags: [knowledge]
      summary: Delete a knowledge article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── FARMER ──────────────────────────────────────────────────────────────────
    Farmer:
      type: object
      required: [id, name, email, phone, location, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        farmName:
          type: ["string", "null"]
        farmSizeHectares:
          type: ["number", "null"]
        cropTypes:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, pending]
        whatsappNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        fieldOfficerId:
          type: ["integer", "null"]
          description: ID of the field officer assigned to manage this farmer
        subscriptionPlan:
          type: string
          enum: [free, basic, standard, premium]
        subscriptionStartDate:
          type: ["string", "null"]
          format: date-time
        subscriptionExpiryDate:
          type: ["string", "null"]
          format: date-time
        aiChatUsageCount:
          type: integer
        aiDiseaseUsageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FarmerCreateResult:
      type: object
      required: [id, name, email, phone, location, status, createdAt, tempPassword]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        farmName:
          type: ["string", "null"]
        farmSizeHectares:
          type: ["number", "null"]
        cropTypes:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, pending]
        whatsappNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        fieldOfficerId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        tempPassword:
          type: string
          description: One-time temporary password shown only at creation; the farmer must change it on first login.

    PasswordResetResult:
      type: object
      required: [id, name, email, tempPassword]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        tempPassword:
          type: string
          description: New one-time temporary password; shown only once. The user must change it on next login.

    FarmerInput:
      type: object
      required: [name, email, phone, location]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        location:
          type: string
        farmName:
