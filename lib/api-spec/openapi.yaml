openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: AgroGuard Limited - Agricultural IoT Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: farmers
    description: Farmer management
  - name: devices
    description: IoT device management
  - name: readings
    description: Sensor data readings
  - name: alerts
    description: Farm alerts and notifications
  - name: recommendations
    description: AI crop recommendations
  - name: dashboard
    description: Dashboard analytics
  - name: staff
    description: Staff management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── FARMERS ──────────────────────────────────────────────────────────────────
  /farmers:
    get:
      operationId: listFarmers
      tags: [farmers]
      summary: List all farmers (scoped by role for field officers)
      responses:
        "200":
          description: List of farmers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farmer"
    post:
      operationId: createFarmer
      tags: [farmers]
      summary: Create a new farmer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmerInput"
      responses:
        "201":
          description: Farmer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerCreateResult"
        "400":
          description: Invalid input

  /farmers/{id}:
    get:
      operationId: getFarmer
      tags: [farmers]
      summary: Get farmer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farmer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"
        "404":
          description: Farmer not found
    patch:
      operationId: updateFarmer
      tags: [farmers]
      summary: Update farmer details (admin can assign field officer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmerUpdate"
      responses:
        "200":
          description: Farmer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"
        "404":
          description: Farmer not found
    delete:
      operationId: deleteFarmer
      tags: [farmers]
      summary: Delete farmer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Farmer deleted
        "404":
          description: Farmer not found

  /farmers/{id}/devices:
    get:
      operationId: getFarmerDevices
      tags: [farmers]
      summary: Get all devices assigned to a farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"

  # ── DEVICES ──────────────────────────────────────────────────────────────────
  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List IoT devices (scoped by role for field officers)
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      operationId: createDevice
      tags: [devices]
      summary: Register a new IoT device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Invalid input

  /devices/{id}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get device by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found
    patch:
      operationId: updateDevice
      tags: [devices]
      summary: Update device info or assign to farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdate"
      responses:
        "200":
          description: Device updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found
    delete:
      operationId: deleteDevice
      tags: [devices]
      summary: Remove device (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Device deleted
        "404":
          description: Device not found

  /devices/{id}/readings:
    get:
      operationId: getDeviceReadings
      tags: [devices]
      summary: Get recent readings for a device (last 50)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"

  # ── SENSOR READINGS ──────────────────────────────────────────────────────────
  /readings:
    get:
      operationId: listReadings
      tags: [readings]
      summary: List recent sensor readings (all devices)
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"
    post:
      operationId: createReading
      tags: [readings]
      summary: Ingest sensor data from IoT device (ESP32)
      description: |
        Called directly by the ESP32 firmware. Accepts the hardware deviceId string.
        Supports the full 7-in-1 soil sensor payload (moisture, temperature, EC, pH, N, P, K)
        as well as simpler sensors that only send moisture + temperature + humidity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorReadingInput"
      responses:
        "201":
          description: Reading ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorReading"
        "400":
          description: Invalid data
        "404":
          description: Device not found

  # ── ALERTS ───────────────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all farm alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a farm alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/resolve:
    patch:
      operationId: resolveAlert
      tags: [alerts]
      summary: Mark alert as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Alert not found

  # ── AI RECOMMENDATIONS ───────────────────────────────────────────────────────
  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List all AI-generated recommendations
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
    post:
      operationId: createRecommendation
      tags: [recommendations]
      summary: Create AI crop/irrigation recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationInput"
      responses:
        "201":
          description: Recommendation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

  /recommendations/{id}/apply:
    patch:
      operationId: applyRecommendation
      tags: [recommendations]
      summary: Mark recommendation as applied
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendation applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          description: Recommendation not found

  # ── STAFF ────────────────────────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member (admin and staff; only admins may create admin/super_admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffCreateResult"

  /staff/{id}:
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Staff updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Staff not found
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Remove staff member (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Staff deleted
        "404":
          description: Staff not found

  # ── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get platform-wide dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/farm-overview:
    get:
      operationId: getFarmOverview
      tags: [dashboard]
      summary: Get per-farm health overview for admin
      responses:
        "200":
          description: Farm health overview list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FarmOverview"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent platform activity feed
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /dashboard/sensor-trends/{deviceId}:
    get:
      operationId: getSensorTrends
      tags: [dashboard]
      summary: Get 24h sensor trend data for charts
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sensor trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorTrendPoint"

  # ── AI ───────────────────────────────────────────────────────────────────────
  /ai/disease-detection:
    post:
      operationId: detectDisease
      tags: [ai]
      summary: Analyse a crop photo and return a disease diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiseaseDetectionInput"
      responses:
        "201":
          description: Diagnosis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseaseReport"

  /ai/disease-reports:
    get:
      operationId: listDiseaseReports
      tags: [ai]
      summary: List crop-disease reports (scoped by role)
      responses:
        "200":
          description: List of disease reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiseaseReport"

  /ai/conversations:
    get:
      operationId: listAiConversations
      tags: [ai]
      summary: List the current user's advisory conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiConversationSummary"

  /ai/conversations/{id}:
    get:
      operationId: getAiConversation
      tags: [ai]
      summary: Get a single advisory conversation with full message history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversation"
        "404":
          description: Conversation not found

  /ai/chat:
    post:
      operationId: sendChatMessage
      tags: [ai]
      summary: Send a message to the AI farming advisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Assistant reply with updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── FARMER ──────────────────────────────────────────────────────────────────
    Farmer:
      type: object
      required: [id, name, email, phone, location, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        farmName:
          type: ["string", "null"]
        farmSizeHectares:
          type: ["number", "null"]
        cropTypes:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, pending]
        whatsappNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        fieldOfficerId:
          type: ["integer", "null"]
          description: ID of the field officer assigned to manage this farmer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FarmerCreateResult:
      type: object
      required: [id, name, email, phone, location, status, createdAt, tempPassword]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        farmName:
          type: ["string", "null"]
        farmSizeHectares:
          type: ["number", "null"]
        cropTypes:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, pending]
        whatsappNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        fieldOfficerId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        tempPassword:
          type: string
          description: One-time temporary password shown only at creation; the farmer must change it on first login.

    FarmerInput:
      type: object
      required: [name, email, phone, location]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        location:
          type: string
        farmName:
          type: string
        farmSizeHectares:
          type: number
        cropTypes:
          type: string
        whatsappNumber:
          type: string
        notes:
          type: string
        fieldOfficerId:
          type: integer
          description: Assign a field officer at creation time

    FarmerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        farmName:
          type: string
        farmSizeHectares:
          type: number
        cropTypes:
          type: string
        status:
          type: string
          enum: [active, inactive, pending]
        whatsappNumber:
          type: string
        notes:
          type: string
        fieldOfficerId:
          type: ["integer", "null"]
          description: Assign or unassign a field officer (null to unassign)

    # ── DEVICE ──────────────────────────────────────────────────────────────────
    Device:
      type: object
      required: [id, deviceId, name, status, createdAt]
      properties:
        id:
          type: integer
        deviceId:
          type: string
          description: Unique hardware identifier (ESP32 chip ID / auto-generated UUID)
        name:
          type: string
        farmerId:
          type: ["integer", "null"]
          description: Assigned farmer ID, null if unassigned
        location:
          type: ["string", "null"]
        status:
          type: string
          enum: [online, offline, maintenance]
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        firmwareVersion:
          type: ["string", "null"]
        batteryLevel:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DeviceInput:
      type: object
      required: [deviceId, name]
      properties:
        deviceId:
          type: string
          minLength: 1
          description: Unique hardware ID (use the auto-generated AGR-XXXX-XXXX format or ESP32 MAC)
        name:
          type: string
          minLength: 1
        farmerId:
          type: integer
        location:
          type: string
        firmwareVersion:
          type: string
        notes:
          type: string

    DeviceUpdate:
      type: object
      properties:
        name:
          type: string
        farmerId:
          type: ["integer", "null"]
        location:
          type: string
        status:
          type: string
          enum: [online, offline, maintenance]
        firmwareVersion:
          type: string
        batteryLevel:
          type: number
        notes:
          type: string

    # ── SENSOR READING ───────────────────────────────────────────────────────────
    SensorReading:
      type: object
      required: [id, deviceId, soilMoisture, temperature, humidity, heatIndex, recordedAt]
      properties:
        id:
          type: integer
        deviceId:
          type: integer
        soilMoisture:
          type: number
          description: Soil moisture percentage (0-100)
        temperature:
          type: number
          description: Temperature in Celsius
        humidity:
          type: number
          description: Relative humidity percentage (0-100)
        heatIndex:
          type: number
          description: Computed heat index in Celsius
        electricalConductivity:
          type: ["number", "null"]
          description: Soil EC in mS/m (7-in-1 sensor)
        ph:
          type: ["number", "null"]
          description: Soil pH 0-14 (7-in-1 sensor)
        nitrogen:
          type: ["number", "null"]
          description: Available nitrogen in mg/kg (7-in-1 sensor)
        phosphorus:
          type: ["number", "null"]
          description: Available phosphorus in mg/kg (7-in-1 sensor)
        potassium:
          type: ["number", "null"]
          description: Available potassium in mg/kg (7-in-1 sensor)
        rainfall:
          type: ["number", "null"]
          description: Rainfall in mm
        lightIntensity:
          type: ["number", "null"]
          description: Light intensity in lux
        recordedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SensorReadingInput:
      type: object
      required: [deviceId, soilMoisture, temperature, humidity, heatIndex]
      description: |
        Sensor payload from ESP32. deviceId is the hardware string ID.
        Supports 7-in-1 sensor fields (EC, pH, NPK) — send only what your sensor provides.
      properties:
        deviceId:
          type: string
          description: Hardware device ID string (matches devices.deviceId)
        soilMoisture:
          type: number
          description: Soil moisture (%)
        temperature:
          type: number
          description: Temperature (°C)
        humidity:
          type: number
          description: Relative humidity (%)
        heatIndex:
          type: number
          description: Computed heat index (°C)
        electricalConductivity:
          type: number
          description: Soil EC in mS/m (7-in-1 sensor only)
        ph:
          type: number
          description: Soil pH (7-in-1 sensor only)
        nitrogen:
          type: number
          description: Nitrogen mg/kg (7-in-1 sensor only)
        phosphorus:
          type: number
          description: Phosphorus mg/kg (7-in-1 sensor only)
        potassium:
          type: number
          description: Potassium mg/kg (7-in-1 sensor only)
        rainfall:
          type: number
        lightIntensity:
          type: number

    # ── ALERT ────────────────────────────────────────────────────────────────────
    Alert:
      type: object
      required: [id, farmerId, type, severity, message, status, createdAt]
      properties:
        id:
          type: integer
        farmerId:
          type: ["integer", "null"]
        deviceId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [soil_moisture, temperature, humidity, pest, disease, irrigation, general]
        severity:
          type: string
          enum: [low, medium, high, critical]
        message:
          type: string
        status:
          type: string
          enum: [active, resolved, dismissed]
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        whatsappSent:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AlertInput:
      type: object
      required: [type, severity, message]
      properties:
        farmerId:
          type: integer
        deviceId:
          type: integer
        type:
          type: string
          enum: [soil_moisture, temperature, humidity, pest, disease, irrigation, general]
        severity:
          type: string
          enum: [low, medium, high, critical]
        message:
          type: string

    # ── RECOMMENDATION ───────────────────────────────────────────────────────────
    Recommendation:
      type: object
      required: [id, farmerId, category, title, description, status, createdAt]
      properties:
        id:
          type: integer
        farmerId:
          type: integer
        deviceId:
          type: ["integer", "null"]
        category:
          type: string
          enum: [irrigation, crop, pest, disease, climate, fertilizer]
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [pending, applied, dismissed]
        appliedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    RecommendationInput:
      type: object
      required: [farmerId, category, title, description]
      properties:
        farmerId:
          type: integer
        deviceId:
          type: integer
        category:
          type: string
          enum: [irrigation, crop, pest, disease, climate, fertilizer]
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        priority:
          type: string
          enum: [low, medium, high]

    # ── STAFF ────────────────────────────────────────────────────────────────────
    StaffMember:
      type: object
      required: [id, name, email, role, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, admin, agronomist, staff]
        status:
          type: string
          enum: [active, inactive]
        department:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    StaffCreateResult:
      type: object
      required: [id, name, email, role, status, createdAt, tempPassword]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, admin, agronomist, staff]
        status:
          type: string
          enum: [active, inactive]
        department:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        tempPassword:
          type: string
          description: One-time temporary password shown only at creation; the staff member must change it on first login.

    StaffInput:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
          enum: [super_admin, admin, agronomist, staff]
        department:
          type: string

    StaffUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [super_admin, admin, agronomist, staff]
        status:
          type: string
          enum: [active, inactive]
        department:
          type: string

    # ── DASHBOARD ────────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required:
        - totalFarmers
        - totalDevices
        - onlineDevices
        - offlineDevices
        - activeAlerts
        - criticalAlerts
        - totalReadingsToday
        - pendingRecommendations
        - avgSoilMoisture
        - avgTemperature
        - avgHumidity
      properties:
        totalFarmers:
          type: integer
        activeFarmers:
          type: integer
        totalDevices:
          type: integer
        onlineDevices:
          type: integer
        offlineDevices:
          type: integer
        activeAlerts:
          type: integer
        criticalAlerts:
          type: integer
        totalReadingsToday:
          type: integer
        pendingRecommendations:
          type: integer
        avgSoilMoisture:
          type: number
        avgTemperature:
          type: number
        avgHumidity:
          type: number

    FarmOverview:
      type: object
      required: [farmerId, farmerName, farmName, location, deviceCount, onlineDevices, alertCount, lastReadingAt, status]
      properties:
        farmerId:
          type: integer
        farmerName:
          type: string
        farmName:
          type: ["string", "null"]
        location:
          type: string
        deviceCount:
          type: integer
        onlineDevices:
          type: integer
        alertCount:
          type: integer
        lastReadingAt:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [healthy, warning, critical, no_data]
        latestSoilMoisture:
          type: ["number", "null"]
        latestTemperature:
          type: ["number", "null"]

    ActivityEvent:
      type: object
      required: [id, type, message, timestamp]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [alert, reading, farmer_created, device_assigned, recommendation]
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        farmerId:
          type: ["integer", "null"]
        deviceId:
          type: ["integer", "null"]
        severity:
          type: ["string", "null"]

    SensorTrendPoint:
      type: object
      required: [timestamp, soilMoisture, temperature, humidity, heatIndex]
      properties:
        timestamp:
          type: string
          format: date-time
        soilMoisture:
          type: number
        temperature:
          type: number
        humidity:
          type: number
        heatIndex:
          type: number

    # ── AI ───────────────────────────────────────────────────────────────────────
    DiseaseDetectionInput:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string
          description: Data URL or raw base64 of the crop photo (JPEG/PNG/WebP).
        cropType:
          type: ["string", "null"]
          description: Optional crop name to focus the analysis, e.g. "maize".
        farmerId:
          type: ["integer", "null"]
          description: Optional farmer this diagnosis concerns.

    DiseaseReport:
      type: object
      required: [id, diagnosis, confidence, severity, treatment, summary, createdBy, createdByType, createdAt]
      properties:
        id:
          type: integer
        farmerId:
          type: ["integer", "null"]
        cropType:
          type: ["string", "null"]
        diagnosis:
          type: string
        confidence:
          type: integer
        severity:
          type: string
          enum: [low, medium, high]
        treatment:
          type: string
        summary:
          type: string
        createdBy:
          type: integer
        createdByType:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    AiConversationSummary:
      type: object
      required: [id, title, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        updatedAt:
          type: string
          format: date-time

    AiConversation:
      type: object
      required: [id, title, messages, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: The user's question for the AI farming advisor.
        conversationId:
          type: ["integer", "null"]
          description: Existing conversation to append to; omit to start a new one.

    ChatResponse:
      type: object
      required: [conversationId, reply, messages]
      properties:
        conversationId:
          type: integer
        reply:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
