          type: string

    # ── SENSOR READING ───────────────────────────────────────────────────────────
    SensorReading:
      type: object
      required: [id, deviceId, soilMoisture, temperature, humidity, heatIndex, recordedAt]
      properties:
        id:
          type: integer
        deviceId:
          type: integer
        soilMoisture:
          type: number
          description: Soil moisture percentage (0-100)
        temperature:
          type: number
          description: Temperature in Celsius
        humidity:
          type: number
          description: Relative humidity percentage (0-100)
        heatIndex:
          type: number
          description: Computed heat index in Celsius
        electricalConductivity:
          type: ["number", "null"]
          description: Soil EC in mS/m (7-in-1 sensor)
        ph:
          type: ["number", "null"]
          description: Soil pH 0-14 (7-in-1 sensor)
        nitrogen:
          type: ["number", "null"]
          description: Available nitrogen in mg/kg (7-in-1 sensor)
        phosphorus:
          type: ["number", "null"]
          description: Available phosphorus in mg/kg (7-in-1 sensor)
        potassium:
          type: ["number", "null"]
          description: Available potassium in mg/kg (7-in-1 sensor)
        rainfall:
          type: ["number", "null"]
          description: Rainfall in mm
        lightIntensity:
          type: ["number", "null"]
          description: Light intensity in lux
        recordedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SensorReadingInput:
      type: object
      required: [deviceId, soilMoisture, temperature, humidity, heatIndex]
      description: |
        Sensor payload from ESP32. deviceId is the hardware string ID.
        Supports 7-in-1 sensor fields (EC, pH, NPK) — send only what your sensor provides.
      properties:
        deviceId:
          type: string
          description: Hardware device ID string (matches devices.deviceId)
        soilMoisture:
          type: number
          description: Soil moisture (%)
        temperature:
          type: number
          description: Temperature (°C)
        humidity:
          type: number
          description: Relative humidity (%)
        heatIndex:
          type: number
          description: Computed heat index (°C)
        electricalConductivity:
          type: number
          description: Soil EC in mS/m (7-in-1 sensor only)
        ph:
          type: number
          description: Soil pH (7-in-1 sensor only)
        nitrogen:
          type: number
          description: Nitrogen mg/kg (7-in-1 sensor only)
        phosphorus:
          type: number
          description: Phosphorus mg/kg (7-in-1 sensor only)
        potassium:
          type: number
          description: Potassium mg/kg (7-in-1 sensor only)
        rainfall:
          type: number
        lightIntensity:
          type: number

